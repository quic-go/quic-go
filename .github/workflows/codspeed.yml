name: Benchmarks

permissions:
  contents: read
  id-token: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: codspeed-macro
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4.17.6
        with:
          mode: walltime
          run: go test -run=^$ -bench=. ./...
