name: Benchmarks

permissions:
  contents: read
  id-token: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: codspeed-macro
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@9d332c4d90b43981c3e55ae8e38e68709996240f # v4.17.0
        with:
          mode: walltime
          run: go test -run=^$ -bench=. ./...
